name: "iamprover"
description: >-
  Prove AWS IAM security invariants with an SMT solver (Z3). Fails the build
  with concrete counterexample traces.
author: "Utkarsh Batham"
branding:
  icon: "shield"
  color: "purple"

inputs:
  invariants:
    description: "Path to the invariant spec YAML"
    required: false
    default: ""
  tf-plan:
    description: "Path to a Terraform plan JSON (`terraform show -json plan`)"
    required: false
    default: ""
  account:
    description: "Path to an account description JSON (principals + policies)"
    required: false
    default: ""
  gaad:
    description: "Path to a live account snapshot (`aws iam get-account-authorization-details`)"
    required: false
    default: ""
  check-trust:
    description: "Analyze role trust policies for cross-account / public assume-role grants"
    required: false
    default: "false"
  trusted-account:
    description: "Whitespace-separated external account ids to allowlist for --check-trust"
    required: false
    default: ""
  check-anonymous:
    description: "Also verify invariants for an unauthenticated principal (catches public grants)"
    required: false
    default: "false"
  privesc:
    description: "Also verify the built-in privilege-escalation invariants"
    required: false
    default: "false"
  privesc-unless:
    description: "Whitespace-separated principal ARN globs exempt from the built-in privesc invariants"
    required: false
    default: ""
  scp:
    description: "Whitespace-separated SCP document file paths (one per OU-level layer)"
    required: false
    default: ""
  rcp:
    description: "Whitespace-separated RCP document file paths"
    required: false
    default: ""
  closure:
    description: "Closure relation invariants extend over (none | assume-role)"
    required: false
    default: ""
  max-hops:
    description: "Max chain length for closure=assume-role (default: 4)"
    required: false
    default: ""
  version:
    description: "iamprover version to install (default: latest from PyPI)"
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Install iamprover
      shell: bash
      env:
        IAMPROVER_VERSION: ${{ inputs.version }}
      run: |
        if [ -n "$IAMPROVER_VERSION" ]; then
          python3 -m pip install --quiet "iamprover==$IAMPROVER_VERSION"
        else
          python3 -m pip install --quiet iamprover
        fi

    - name: Verify invariants
      shell: bash
      # Inputs pass through env (not inline interpolation) to avoid shell injection.
      env:
        IN_INVARIANTS: ${{ inputs.invariants }}
        IN_TF_PLAN: ${{ inputs['tf-plan'] }}
        IN_ACCOUNT: ${{ inputs.account }}
        IN_GAAD: ${{ inputs.gaad }}
        IN_CHECK_ANONYMOUS: ${{ inputs['check-anonymous'] }}
        IN_PRIVESC: ${{ inputs.privesc }}
        IN_PRIVESC_UNLESS: ${{ inputs['privesc-unless'] }}
        IN_CHECK_TRUST: ${{ inputs['check-trust'] }}
        IN_TRUSTED_ACCOUNT: ${{ inputs['trusted-account'] }}
        IN_SCP: ${{ inputs.scp }}
        IN_RCP: ${{ inputs.rcp }}
        IN_CLOSURE: ${{ inputs.closure }}
        IN_MAX_HOPS: ${{ inputs['max-hops'] }}
      run: |
        args=(verify)
        if [ -n "$IN_TF_PLAN" ]; then args+=(--tf-plan "$IN_TF_PLAN"); fi
        if [ -n "$IN_ACCOUNT" ]; then args+=(--account "$IN_ACCOUNT"); fi
        if [ -n "$IN_GAAD" ]; then args+=(--gaad "$IN_GAAD"); fi
        if [ -n "$IN_INVARIANTS" ]; then args+=(--invariants "$IN_INVARIANTS"); fi
        if [ "$IN_CHECK_ANONYMOUS" = "true" ]; then args+=(--check-anonymous); fi
        if [ "$IN_PRIVESC" = "true" ]; then args+=(--privesc); fi
        for glob in $IN_PRIVESC_UNLESS; do args+=(--privesc-unless "$glob"); done
        if [ "$IN_CHECK_TRUST" = "true" ]; then args+=(--check-trust); fi
        for acct in $IN_TRUSTED_ACCOUNT; do args+=(--trusted-account "$acct"); done
        for f in $IN_SCP; do args+=(--scp "$f"); done
        for f in $IN_RCP; do args+=(--rcp "$f"); done
        if [ -n "$IN_CLOSURE" ]; then args+=(--closure "$IN_CLOSURE"); fi
        if [ -n "$IN_MAX_HOPS" ]; then args+=(--max-hops "$IN_MAX_HOPS"); fi
        iamprover "${args[@]}"
